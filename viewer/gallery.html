<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoreForge — Conversion Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 32px 40px;
            border-bottom: 2px solid #e94560;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 800;
            color: #e94560;
            margin-bottom: 4px;
        }
        .header h1 span { color: #fff; font-weight: 300; }
        .header p { color: #888; font-size: 14px; margin-top: 8px; }
        .stats-bar {
            display: flex;
            gap: 32px;
            padding: 16px 40px;
            background: #111;
            border-bottom: 1px solid #222;
        }
        .stat { text-align: center; }
        .stat .number { font-size: 28px; font-weight: 800; color: #e94560; }
        .stat .label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
            padding: 24px 40px;
        }
        .card {
            background: #1a1a2e;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #222;
            transition: all 0.2s;
        }
        .card:hover { border-color: #e94560; transform: translateY(-2px); }
        .card a { text-decoration: none; color: inherit; }
        .card-images {
            display: flex;
            height: 200px;
            overflow: hidden;
            background: #fff;
        }
        .card-images .side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .card-images .side + .side { border-left: 2px solid #e94560; }
        .card-images img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .card-images .label {
            position: absolute;
            top: 4px;
            left: 4px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .card-body { padding: 16px; }
        .card-body h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: #fff;
        }
        .card-meta {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .card-meta .tag {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
        }
        .tag.score-high { background: #4ade8033; color: #4ade80; }
        .tag.score-mid { background: #f59e0b33; color: #f59e0b; }
        .tag.score-low { background: #ef444433; color: #ef4444; }
        .tag.info { background: #3b82f633; color: #3b82f6; }
        .card-scores {
            display: flex;
            gap: 16px;
            font-size: 12px;
        }
        .card-scores .metric { }
        .card-scores .metric .lbl { color: #666; }
        .card-scores .metric .val { font-weight: 700; }
        .progress-bar {
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin-top: 12px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s;
        }
        .fill.high { background: #4ade80; }
        .fill.mid { background: #f59e0b; }
        .fill.low { background: #ef4444; }
        .empty-state {
            text-align: center;
            padding: 80px 40px;
            color: #555;
        }
        .empty-state h2 { color: #888; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>ScoreForge <span>Conversion Gallery</span></h1>
        <p>AI-powered sheet music to MusicXML — visual comparison of extraction accuracy</p>
    </div>
    <div class="stats-bar" id="stats-bar">
        <div class="stat"><div class="number" id="stat-total">-</div><div class="label">Tests Run</div></div>
        <div class="stat"><div class="number" id="stat-avg">-</div><div class="label">Avg Score</div></div>
        <div class="stat"><div class="number" id="stat-perfect">-</div><div class="label">Perfect</div></div>
        <div class="stat"><div class="number" id="stat-improving">-</div><div class="label">Improving</div></div>
    </div>
    <div class="grid" id="gallery"></div>
    <div class="empty-state hidden" id="empty-state">
        <h2>No results yet</h2>
        <p>Run the ScoreForge pipeline to generate conversion results.</p>
    </div>

    <script>
    async function loadResults() {
        try {
            const resp = await fetch('/results/index.json');
            if (!resp.ok) throw new Error('No index');
            const data = await resp.json();
            renderGallery(data.runs || []);
        } catch (e) {
            // Try loading individual reports
            document.getElementById('empty-state').classList.remove('hidden');
        }
    }

    function renderGallery(runs) {
        const gallery = document.getElementById('gallery');
        if (!runs.length) {
            document.getElementById('empty-state').classList.remove('hidden');
            return;
        }

        // Stats
        document.getElementById('stat-total').textContent = runs.length;
        const scores = runs.filter(r => r.best_score).map(r => r.best_score);
        document.getElementById('stat-avg').textContent = scores.length
            ? Math.round(scores.reduce((a,b) => a+b, 0) / scores.length) + '%'
            : '-';
        document.getElementById('stat-perfect').textContent = runs.filter(r => r.best_score >= 98).length;
        document.getElementById('stat-improving').textContent = runs.filter(r => r.total_iterations > 1).length;

        runs.sort((a, b) => (b.timestamp || '').localeCompare(a.timestamp || ''));

        runs.forEach(run => {
            const score = run.best_score || 0;
            const scoreClass = score >= 90 ? 'high' : score >= 60 ? 'mid' : 'low';

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <a href="/results/${run.fixture}/${run.run_id}/report.html" target="_blank">
                    <div class="card-images">
                        <div class="side">
                            <span class="label">Original</span>
                            <img src="/results/${run.fixture}/${run.run_id}/ground_truth.png" alt="Original">
                        </div>
                        <div class="side">
                            <span class="label">Extracted</span>
                            <img src="/results/${run.fixture}/${run.run_id}/iter_${run.total_iterations}/rendered.png" alt="Extracted" onerror="this.src='/results/${run.fixture}/${run.run_id}/iter_1/rendered.png'">
                        </div>
                    </div>
                    <div class="card-body">
                        <h3>${run.fixture}</h3>
                        <div class="card-meta">
                            <span class="tag score-${scoreClass}">${score.toFixed(1)}% match</span>
                            <span class="tag info">${run.total_iterations} iteration${run.total_iterations > 1 ? 's' : ''}</span>
                            ${run.converged ? '<span class="tag score-high">Converged</span>' : ''}
                        </div>
                        <div class="card-scores">
                            <div class="metric"><span class="lbl">Pitch: </span><span class="val">${run.pitch_accuracy || '-'}%</span></div>
                            <div class="metric"><span class="lbl">Rhythm: </span><span class="val">${run.rhythm_accuracy || '-'}%</span></div>
                            <div class="metric"><span class="lbl">Notes: </span><span class="val">${run.notes_matched || '-'}/${run.notes_total || '-'}</span></div>
                        </div>
                        <div class="progress-bar"><div class="fill ${scoreClass}" style="width:${score}%"></div></div>
                    </div>
                </a>
            `;
            gallery.appendChild(card);
        });
    }

    loadResults();
    </script>
</body>
</html>
